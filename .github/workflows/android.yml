name: Build SmartLift APKs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86, x86_64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.4.3 python-for-android==2025.8.2 kivy

      - name: Update buildozer.spec for ABI
        run: |
          sed -i "s/^#* *android.arch =.*/android.arch = ${{ matrix.abi }}/" buildozer.spec

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartLift-${{ matrix.abi }}
          path: bin/*.apk

  universal_apk:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.4.3 python-for-android==2025.8.2 kivy

      - name: Build universal APK
        run: |
          sed -i "s/^#* *android.multiple_apks =.*/android.multiple_apks = False/" buildozer.spec
          buildozer android debug

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartLift-universal
          path: bin/*.apk
