name: Android build — SmartLift
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_API: 34
  NDK_API: 21
  ANDROID_BUILD_TOOLS: 35.0.0
  DIST_NAME: smartlift

jobs:
  build-per-abi:
    name: Build APK (per-ABI)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y \
            openjdk-17-jdk unzip zip git python3 python3-pip \
            libffi-dev libssl-dev libsqlite3-dev libjpeg-dev zlib1g-dev \
            build-essential libgl1-mesa-dev libncurses6 libtinfo6

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Upgrade pip & install build tools
        run: |
          python -m pip install --upgrade pip
          pip install "Cython==3.0.11"
          pip install buildozer==1.5.0
          pip install --upgrade git+https://github.com/kivy/python-for-android.git@develop

      - name: Patch python-for-android libffi recipe
        run: python patch_libffi.py

      - name: Set ABI in buildozer.spec
        run: |
          sed -i -E "s/^#?\s*android\.archs\s*=.*/android.archs = ${{ matrix.abi }}/" buildozer.spec

      - name: Build Debug APK
        run: buildozer android debug

      - name: Upload ABI APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}
          path: bin/*.apk

  build-aab:
    name: Build AAB (Release)
    runs-on: ubuntu-latest
    needs: build-per-abi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openjdk-17-jdk python3 python3-pip \
            libffi-dev libssl-dev libsqlite3-dev libjpeg-dev zlib1g-dev build-essential

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install p4a & deps
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade git+https://github.com/kivy/python-for-android.git@develop
          pip install "Cython==3.0.11" buildozer==1.5.0

      - name: Patch libffi recipe
        run: python patch_libffi.py

      - name: Build AAB
        run: |
          p4a apk \
            --private . \
            --package=org.smartlift.app \
            --name="SmartLift" \
            --version=2.0.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.2.1,plyer,kivy-garden.graph,sdl2 \
            --arch=all \
            --dist-name=${{ env.DIST_NAME }} \
            --release \
            --format=aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SmartLift-release-aab
          path: "**/*.aab"

  merge-and-sign:
    name: Merge APKs & Sign
    runs-on: ubuntu-latest
    needs: [build-per-abi, build-aab]
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ABI APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create universal APK placeholder
        run: |
          mkdir -p bin
          # Safely pick the first available APK as placeholder
          find artifacts -type f -name "*.apk" -print0 | head -z -n1 | xargs -0 cp bin/universal-release.apk 2>/dev/null || echo "No APK artifacts found"

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'

      - name: Prepare keystore
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Sign APK
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          apksigner sign \
            --ks release.jks \
            --ks-pass env:KEYSTORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --out bin/universal-release-signed.apk \
            bin/universal-release.apk
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: final-artifacts
          path: |
            bin/*.apk
            artifacts/SmartLift-release-aab/*.aab
