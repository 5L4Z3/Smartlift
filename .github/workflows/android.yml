name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libncurses6 libtinfo6 libffi-dev libssl-dev \
            openjdk-17-jdk unzip zip python3 python3-pip git

      - name: Set up Python environment
        run: |
          python3 -m pip install --upgrade pip
          pip install buildozer cython

      - name: Patch libffi
        run: |
          chmod +x .github/scripts/patch_libffi.sh
          .github/scripts/patch_libffi.sh

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release.keystore

      - name: Build APK (${{ matrix.abi }})
        run: |
          buildozer android release --arch ${{ matrix.abi }}

      - name: Upload ABI APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: apk-${{ matrix.abi }}
          path: bin/*.apk

  merge-apks:
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download all ABI APKs
        uses: actions/download-artifact@v3
        with:
          path: apks

      - name: Merge into universal APK
        run: |
          pip install apktool
          python3 .github/scripts/merge_apks.py apks bin/universal-release.apk

      - name: Sign universal APK
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release.keystore
          echo "${{ secrets.KEY_PROPERTIES }}" > key.properties
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            bin/universal-release.apk release-key-alias

      - name: Upload final Universal APK
        uses: actions/upload-artifact@v3
        with:
          name: universal-apk
          path: bin/universal-release.apk
