name: Build Android APKs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.1
          pip install cython

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Apply libffi patch
        run: python3 .github/scripts/patch_libffi.py || echo "Libffi patch skipped"

      - name: Update buildozer arch
        run: sed -i "s/^#*\s*android.archs =.*/android.archs = ${matrix.abi}/" buildozer.spec

      - name: Build APK
        run: buildozer android debug

      - name: Collect APK
        uses: actions/upload-artifact@v4
        with:
          name: smartlift-apk-${{ matrix.abi }}
          path: ./.buildozer/android/platform/build/dists/smartlift/bin/*.apk

  universal:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge APKs into universal
        run: |
          mkdir -p universal
          cp ./.buildozer/android/platform/build/dists/smartlift/bin/*.apk universal/

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: smartlift-universal-apk
          path: universal/*.apk
