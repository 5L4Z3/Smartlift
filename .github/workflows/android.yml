name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build per-ABI APKs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython kivy buildozer python-for-android

      - name: Run libffi patch
        run: python .github/scripts/patch_libffi.py || echo "libffi patch skipped"

      - name: Configure Buildozer for ABI
        run: sed -i "s/^android.archs =.*/android.archs = ${matrix.abi}/" buildozer.spec || echo "android.archs not found"

      - name: Configure signing via GH Secrets
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo $ANDROID_KEYSTORE_BASE64 | base64 --decode > release.keystore
          sed -i "s|# android.keystore =.*|android.keystore = release.keystore|" buildozer.spec
          sed -i "s|# android.keyalias =.*|android.keyalias = ${ANDROID_KEY_ALIAS}|" buildozer.spec
          sed -i "s|# android.keyalias_password =.*|android.keyalias_password = ${ANDROID_KEY_PASSWORD}|" buildozer.spec

      - name: Build APK
        run: buildozer android release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartlift-${{ matrix.abi }}-apk
          path: bin/*.apk

  universal:
    name: Build Universal APK
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython kivy buildozer python-for-android

      - name: Configure Buildozer for universal APK
        run: sed -i "s/^android.archs =.*/android.archs = armeabi-v7a,arm64-v8a,x86,x86_64/" buildozer.spec || echo "android.archs not found"

      - name: Configure signing via GH Secrets
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo $ANDROID_KEYSTORE_BASE64 | base64 --decode > release.keystore
          sed -i "s|# android.keystore =.*|android.keystore = release.keystore|" buildozer.spec
          sed -i "s|# android.keyalias =.*|android.keyalias = ${ANDROID_KEY_ALIAS}|" buildozer.spec
          sed -i "s|# android.keyalias_password =.*|android.keyalias_password = ${ANDROID_KEY_PASSWORD}|" buildozer.spec

      - name: Build Universal APK
        run: buildozer android release

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: smartlift-universal-apk
          path: bin/*.apk
