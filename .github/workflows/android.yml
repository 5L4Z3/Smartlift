name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.4.2 python-for-android==2025.8.2 cython

      - name: Patch libffi
        run: python .github/scripts/patch_libffi.py || echo "libffi patch skipped"

      - name: Setup keystore
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Generating temporary keystore..."
            keytool -genkey -v \
              -keystore temp-release.keystore \
              -alias smartlift \
              -storepass 123456 \
              -keypass 123456 \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
            base64 temp-release.keystore > temp-release.keystore.b64
            export ANDROID_KEYSTORE_BASE64=$(cat temp-release.keystore.b64)
            export ANDROID_KEY_ALIAS=smartlift
            export ANDROID_KEY_PASSWORD=123456
          fi

      - name: Decode keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Set buildozer arch
        run: sed -i "s/^android.archs =.*/android.archs = ${matrix.abi}/" buildozer.spec

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartLift-${{ matrix.abi }}
          path: bin/*.apk
