name: Android Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install buildozer Cython virtualenv

      - name: Set architecture in buildozer.spec
        run: sed -i "s/^#* *android.arch =.*/android.arch = ${{ matrix.abi }}/" buildozer.spec

      - name: Patch libffi
        run: python .github/scripts/patch_libffi.py

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smartlift-${{ matrix.abi }}
          path: bin/*.apk

  universal:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install buildozer Cython virtualenv

      - name: Reset to universal build
        run: sed -i "s/^#* *android.arch =.*/# android.arch = arm64-v8a/" buildozer.spec

      - name: Patch libffi
        run: python .github/scripts/patch_libffi.py

      - name: Build universal APK
        run: buildozer android debug

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: smartlift-universal
          path: bin/*.apk
