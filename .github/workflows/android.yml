name: Android Build — SmartLift
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_API: 34
  ANDROID_NDK: 27.2.12479018
  DIST_NAME: smartlift

jobs:
  build-per-abi:
    name: Build APK (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}-${{ matrix.abi }}

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with: { python-version: "3.10" }

      - name: Install System Deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openjdk-17-jdk python3-pip python3-venv \
            libffi-dev libssl-dev libsqlite3-dev libjpeg-dev zlib1g-dev \
            build-essential libgl1-mesa-dev libncurses6 libtinfo6

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip wheel
          pip install Cython==3.0.11 buildozer==1.5.0
          pip install --upgrade git+https://github.com/kivy/python-for-android.git@develop

      - name: Patch libffi
        run: python patch_libffi.py

      - name: Configure ABI
        run: |
          sed -i "s/^android\.archs\s*=.*/android.archs = ${{ matrix.abi }}/" buildozer.spec

      - name: Build Debug APK
        run: buildozer android debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}
          path: bin/*.apk

  build-aab:
    name: Build AAB (Release)
    runs-on: ubuntu-latest
    needs: build-per-abi
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with: { python-version: "3.10" }

      - name: Install Tools & Patch
        run: |
          python -m pip install --upgrade pip wheel Cython==3.0.11 buildozer==1.5.0
          pip install --upgrade git+https://github.com/kivy/python-for-android.git@develop
          python patch_libffi.py

      - name: Build AAB
        run: |
          p4a bundle \
            --private . \
            --package=org.smartlift.app \
            --name="SmartLift" \
            --version=2.0.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.2.1,plyer,kivy-garden.graph,sdl2 \
            --arch=all \
            --dist-name=${{ env.DIST_NAME }} \
            --release \
            --color=always

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SmartLift-release-aab
          path: "**/*.aab"

  sign-and-package:
    name: Sign & Package
    runs-on: ubuntu-latest
    needs: [build-per-abi, build-aab]
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }

      - name: Setup Java
        uses: actions/setup-java@v3
        with: { java-version: "17" }

      - name: Sign APKs
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.jks
          for apk in artifacts/apk-*/smart*.apk; do
            name=$(basename "$apk" .apk)
            apksigner sign \
              --ks release.jks \
              --ks-pass env:KEYSTORE_PASSWORD \
              --key-pass env:KEY_PASSWORD \
              --out "${name}-signed.apk" "$apk"
          done
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: final-release-artifacts
          path: |
            **/*-signed.apk
            artifacts/SmartLift-release-aab/*.aab
