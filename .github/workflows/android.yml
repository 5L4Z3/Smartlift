name: Android Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython buildozer python-for-android

      - name: Run libffi patch
        run: |
          python .github/scripts/patch_libffi.py || echo "Libffi patch skipped"

      - name: Adjust buildozer.spec for ABI
        run: |
          sed -i "s/^#* *android.arch =.*/android.arch = ${matrix.abi}/" buildozer.spec

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}
          path: bin/*.apk

  universal:
    name: Build Universal APK
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython buildozer python-for-android

      - name: Build Universal APK
        run: |
          # Ensure multiple_apks=True in buildozer.spec
          buildozer android debug deploy run

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-universal
          path: bin/*.apk
